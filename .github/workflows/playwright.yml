  cucumber:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 1001

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # TypeScript type check
      - name: Type check
        run: npm run check:types

      # Run Cucumber tests
      - name: Run Cucumber Tests
        run: npm run cucumber-all

      # Upload Cucumber report
      - name: Upload Cucumber Report
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: reports/

  deploy:
   # needs: test
    needs: cucumber
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

  #     #Download Playwright reports
  #     - name: Download Chromium report
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: playwright-report-chromium
  #         path: site/chromium

  #     - name: Download Firefox report
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: playwright-report-firefox
  #         path: site/firefox

  #     - name: Download Webkit report
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: playwright-report-webkit
  #         path: site/webkit

      - name: Download Cucumber report
        uses: actions/download-artifact@v4
        with:
          name: cucumber-report
          path: site/cucumber

      # Copy static index.html for GitHub Pages
      - name: Copy index page
        run: cp gh-pages/index.html site/index.html

      # Write to GitHub Pages using index.html and downloaded reports
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  